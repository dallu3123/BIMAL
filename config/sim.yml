task:
  dataset_repo: "lerobot/aloha_sim_transfer_cube_human"
  data_dir: "./data/sim"
  action_dim: 14
  seq_len: 8
  num_cameras: 1

model:
  latent_dim: 32
  flow_hidden_dim: 512
  flow_num_layers: 4
  num_sampling_steps: 8

  # VITA core (latent & losses)
  decode_flow_latents: true
  consistency_weight: 1.0
  enc_contrastive_weight: 0.0
  flow_contrastive_weight: 0.0
  sigma: 0.0

wandb:
  project: "BIMAL"
  run_name: "sim_transfer_cube_v2"

train:
  epochs: 200
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 1.0e-4
  save_freq: 50
  ckpt_dir: "./outputs/checkpoints/sim"
  val_ratio: 0.1
